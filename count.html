<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>文字数カウント | ARDY TOOLBASE</title>
</head>

<body>

<h1>文字数カウントツール</h1>

<p>文章を入力してください</p>

<textarea id="text" rows="10" cols="60" oninput="countText()"></textarea>

<p id="result">文字数：0</p>

<script>

function countText(){

let text = document.getElementById("text").value;

let length = text.length;

document.getElementById("result").innerText =
"文字数：" + length.toLocaleString();

}

</script>

</body>

</html>
